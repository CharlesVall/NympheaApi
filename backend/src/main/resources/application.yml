spring:
  application:
    name: nympheas-api
  datasource:
    url: jdbc:postgresql://localhost:5432/app_db
    username: app_user
    password: app_password
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  swagger-ui:
    path=/swagger-ui:
      html: